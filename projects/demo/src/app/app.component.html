<div class="mt-12 mb-36 max-w-6xl mx-auto px-4 lg:px-8">
  <h1 id="menu" class="text-2xl font-bold mb-12 text-gray-700 scroll-mt-6">
    Menu
  </h1>
  <div class="space-y-20">
    <!-- Styled Menu -->
    <app-demo-container
      name="Styled"
      [htmlSource]="formattedSources.styledMenuHtml"
      [typescriptSource]="formattedSources.styledMenuTypescript"
    >
      <app-styled-menu></app-styled-menu>
    </app-demo-container>

    <!-- Styled Menu using angular cdk overlay: https://material.angular.io/cdk/overlay/overview -->
    <app-demo-container
      name="Styled using Angular CDK Overlay"
      [htmlSource]="formattedSources.styledMenuCdkHtml"
      [typescriptSource]="formattedSources.styledMenuCdkTypescript"
    >
      <app-styled-menu-cdk></app-styled-menu-cdk>
    </app-demo-container>

    <!-- Unstyled Menu -->
    <app-demo-container
      name="Minimal Styles"
      [htmlSource]="formattedSources.unstyledMenuHtml"
      [typescriptSource]="formattedSources.unstyledMenuTypescript"
    >
      <app-unstyled-menu></app-unstyled-menu>
    </app-demo-container>
  </div>

  <h1
    id="listbox"
    class="text-2xl font-bold mb-8 text-gray-700 mt-28 scroll-mt-12"
  >
    Select (Listbox)
    <p class="text-gray-400 text-base font-normal">Draft</p>
  </h1>

  <div class="space-y-20">
    <!-- Styled Select -->
    <app-demo-container
      name="Styled"
      [htmlSource]="formattedSources.styledSelectHtml"
      [typescriptSource]="formattedSources.styledSelectTypescript"
    >
      <app-styled-select></app-styled-select>
    </app-demo-container>

    <!-- Unstyled Select -->
    <app-demo-container
      name="Minimal Styles"
      [htmlSource]="formattedSources.unstyledSelectHtml"
      [typescriptSource]="formattedSources.unstyledSelectTypescript"
    >
      <app-unstyled-select></app-unstyled-select>
    </app-demo-container>
  </div>

  <h1
    id="transition"
    class="text-2xl font-bold mb-8 text-gray-700 mt-28 scroll-mt-12"
  >
    Transition
  </h1>

  <div>
    <app-demo-container name="Simple">
      <div>
        <div class="w-40 h-40 mx-auto">
          <ng-template
            [hlTransition]="shown"
            hlTransitionEnter="transform transition duration-[400ms]"
            hlTransitionEnterFrom="opacity-0 rotate-[-120deg] scale-50"
            hlTransitionEnterTo="opacity-100 rotate-0 scale-100"
            hlTransitionLeave="transform duration-200 transition ease-in-out"
            hlTransitionLeaveFrom="opacity-100 rotate-0 scale-100 "
            hlTransitionLeaveTo="opacity-0 scale-95 "
            ><div
              class="p-2 bg-yellow-500 text-white h-full rounded-xl shadow-lg"
            ></div
          ></ng-template>
        </div>

        <div class="mt-12 flex justify-center">
          <div>
            <button
              class="rounded-md border border-gray-300 bg-white px-6 py-2 text-gray-700 shadow-sm hover:bg-gray-50"
              (click)="toggle()"
            >
              Toggle
            </button>
            <div class="text-center mt-2 text-gray-400">
              {{ shown ? "shown" : "hidden" }}
            </div>
          </div>
        </div>
      </div>
    </app-demo-container>
  </div>
</div>
